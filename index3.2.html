  // Mostra a foto no ecrã logo após tirá-la
  function previewImage(event) {
    const reader = new FileReader();
    reader.onload = function() {
      const preview = document.getElementById('cameraPreview');
      preview.src = reader.result;
      preview.style.display = 'inline-block';
      document.getElementById("result").innerText = "Foto pronta! Carrega em 'Detect Pokémon'.";
    }
    if(event.target.files[0]) {
      reader.readAsDataURL(event.target.files[0]);
    }
  }

  async function predict() {
    const resultElement = document.getElementById("result");
    
    if (!classifier) {
      resultElement.innerText = "A inicializar a inteligência artificial... Aguarda...";
      try {
        classifier = await window.pipeline('image-classification', CAMINHO_DO_BOT);
      } catch (err) {
        resultElement.innerText = "Erro ao carregar o bot da internet.";
        console.error(err);
        return;
      }
    }

    const input = document.getElementById("imageUpload");
    if (!input.files || input.files.length === 0) {
      alert("Por favor, tira uma foto primeiro.");
      return;
    }

    const file = input.files[0];
    const reader = new FileReader();

    resultElement.innerText = "A analisar a imagem do Pokémon...";

    reader.onload = async function(e) {
      const imageSrc = e.target.result;

      try {
        const outputs = await classifier(imageSrc);
        const topPrediction = outputs[0];
        const detectedName = topPrediction.label;

        resultElement.innerText = `Detetado: ${detectedName} (Confiança: ${(topPrediction.score * 100).toFixed(2)}%)`;

        const pokemon = pokedexData.find(p => p["Nome"] && p["Nome"].toLowerCase() === detectedName.toLowerCase());
        const infoDiv = document.getElementById("pokedexInfo");

        if (pokemon) {
          infoDiv.style.display = "block";
          infoDiv.innerHTML = `
            <h3>${pokemon["Nome"]} (#${pokemon["Número"]})</h3>
            <p><strong>Tipo 1:</strong> ${pokemon["Tipo 1"]}</p>
            <p><strong>Tipo 2:</strong> ${pokemon["Tipo 2"] || '-'}</p>
            <p><strong>Categoria:</strong> ${pokemon["Categoria"]}</p>
            <p><strong>Altura (m):</strong> ${pokemon["Altura (m)"]} m</p>
            <p><strong>Peso (kg):</strong> ${pokemon["Peso (kg)"]} kg</p>
            <p><strong>Habilidade:</strong> ${pokemon["Habilidade"]}</p>
            <p style="font-style: italic; margin-top: 10px; color: #555;">"${pokemon["Descrição"]}"</p>
          `;
        } else {
          infoDiv.style.display = "block";
          infoDiv.innerText = `O bot identificou como "${detectedName}". Ele existe nas gerações mais recentes, mas não está nos teus 151 originais de Kanto!`;
        }
      } catch (error) {
        resultElement.innerText = "Ocorreu um erro ao processar a imagem.";
        console.error(error);
      }
    };

    reader.readAsDataURL(file);
  }
</script>
